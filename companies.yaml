# Manual domain mapping for the 13 P2 pharma accounts.
# `find-and-enrich-company` needs a domain or LinkedIn URL — name alone fails.
# Feel free to edit if a domain is wrong or you want to target a specific entity
# (e.g., Merck Group = Merck KGaA Germany, ≠ MSD/Merck & Co US).

p2_accounts:
