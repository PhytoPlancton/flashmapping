<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>FlashMapping</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'sans-serif']
          },
          colors: {
            ink: {
              50:  '#F9FAFB',
              100: '#F4F4F5',
              200: '#E5E7EB',
              300: '#D1D5DB',
              400: '#9CA3AF',
              500: '#6B7280',
              600: '#4B5563',
              700: '#374151',
              800: '#1F2937',
              900: '#111827'
            },
            cat: {
              c_level:       '#B8860B',
              digital:       '#2563EB',
              data_ai:       '#7C3AED',
              it_is:         '#475569',
              medical:       '#059669',
              market_access: '#0D9488',
              commercial:    '#EA580C',
              rd_clinical:   '#4F46E5',
              hr:            '#DB2777',
              marketing:     '#CA8A04',
              quality:       '#6B7280',
              other:         '#9CA3AF'
            }
          },
          boxShadow: {
            card:    '0 1px 2px rgba(16,24,40,0.04), 0 1px 3px rgba(16,24,40,0.06)',
            cardHv:  '0 4px 8px -2px rgba(16,24,40,0.08), 0 2px 4px -2px rgba(16,24,40,0.06)',
            modal:   '0 12px 16px -4px rgba(16,24,40,0.08), 0 4px 6px -2px rgba(16,24,40,0.03)'
          }
        }
      }
    };
  </script>
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body class="font-sans bg-[#FAFAFA] text-ink-900 antialiased">
  <div id="app"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
